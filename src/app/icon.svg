<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4D03F"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4D03F"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Outer gold ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#ring)" stroke-width="1.2"/>

  <!-- Inner gold coin circle -->
  <circle cx="16" cy="16" r="11.5" fill="url(#gold)"/>

  <!-- Inner coin detail ring -->
  <circle cx="16" cy="16" r="9.8" fill="none" stroke="#0A0A0A" stroke-width="0.7" stroke-opacity="0.35"/>

  <!-- Letter C (bold, centered) -->
  <path d="M19.5 11.2a6.5 6.5 0 1 0 0 9.6" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
</svg>
